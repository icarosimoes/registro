name: registro-test

services:
  postgres-test:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: registro_test
      POSTGRES_USER: registro
      POSTGRES_PASSWORD: registro
    ports:
      - "5434:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U registro -d registro_test"]
      interval: 2s
      timeout: 3s
      retries: 10
