services:
  api:
    image: ghcr.io/icarosimoes/registro/api:${IMAGE_TAG:-latest}
    environment:
      APP_NAME: Registro API
      ENVIRONMENT: production
      WEB_ORIGINS: ${REGISTRO_WEB_ORIGIN}
      DATABASE_URL_FILE: /run/secrets/registro_database_url
      JWT_SECRET_FILE: /run/secrets/registro_jwt_secret
      CHESS_HOTEL_INTEGRATION_KEY_FILE: /run/secrets/chess_hotel_integration_key
      CHESS_HOTEL_COMPANY_SLUG: ${CHESS_HOTEL_COMPANY_SLUG:-aero-hotel}
      REGISTRO_WEB_URL: https://${REGISTRO_WEB_HOST}
      REDIS_URL: redis://redis:6379/0
    secrets:
      - registro_database_url
      - registro_jwt_secret
      - chess_hotel_integration_key
    networks:
      - registro-internal
      - traefik-public
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public
        - traefik.http.routers.registro-api.rule=Host(`${REGISTRO_API_HOST}`)
        - traefik.http.routers.registro-api.entrypoints=websecure
        - traefik.http.routers.registro-api.tls.certresolver=le
        - traefik.http.services.registro-api.loadbalancer.server.port=8000

  web:
    image: ghcr.io/icarosimoes/registro/web:${IMAGE_TAG:-latest}
    environment:
      API_URL: http://api:8000/api/v1
    networks:
      - registro-internal
      - traefik-public
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public
        - traefik.http.routers.registro-web.rule=Host(`${REGISTRO_WEB_HOST}`)
        - traefik.http.routers.registro-web.entrypoints=websecure
        - traefik.http.routers.registro-web.tls.certresolver=le
        - traefik.http.services.registro-web.loadbalancer.server.port=3000

  admin:
    image: ghcr.io/icarosimoes/registro/admin:${IMAGE_TAG:-latest}
    environment:
      API_URL: http://api:8000/api/v1
    networks:
      - registro-internal
      - traefik-public
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public
        - traefik.http.routers.registro-admin.rule=Host(`${REGISTRO_ADMIN_HOST}`)
        - traefik.http.routers.registro-admin.entrypoints=websecure
        - traefik.http.routers.registro-admin.tls.certresolver=le
        - traefik.http.services.registro-admin.loadbalancer.server.port=3001

  redis:
    image: redis:7-alpine
    networks:
      - registro-internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    volumes:
      - registro-redis-data:/data

networks:
  registro-internal:
    driver: overlay
  traefik-public:
    external: true

volumes:
  registro-redis-data:

secrets:
  registro_database_url:
    external: true
  registro_jwt_secret:
    external: true
  chess_hotel_integration_key:
    external: true
