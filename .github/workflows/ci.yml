name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-lint:
    name: API — Ruff
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  api-test:
    name: API — pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: registro_test
          MYSQL_USER: registro
          MYSQL_PASSWORD: registro
          MYSQL_ROOT_PASSWORD: registro-root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -pregistro-root --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      DATABASE_URL: mysql+asyncmy://registro:registro@127.0.0.1:3306/registro_test?charset=utf8mb4
      JWT_SECRET: ci-test-secret-at-least-32-characters-long
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: alembic upgrade head
      - run: pytest -v

  web-typecheck:
    name: Web — TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npx tsc --noEmit
