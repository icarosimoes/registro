name: Publish images

on:
  push:
    branches: [main]
    paths:
      - api/**
      - web/**
      - admin/**
      - .github/workflows/publish.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: api
            service: registro_api
          - name: web
            context: web
            service: registro_web
          - name: admin
            context: admin
            service: registro_admin
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          target: production
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository }}/${{ matrix.name }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  deploy:
    name: Deploy to VPS
    needs: publish
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}
      - name: Update Swarm services
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          IMAGE_TAG: sha-${{ github.sha }}
          REPO: ghcr.io/${{ github.repository }}
        run: |
          ssh -o StrictHostKeyChecking=no root@$VPS_HOST "
            docker service update --image ${REPO}/api:${IMAGE_TAG} registro_api --detach
            docker service update --image ${REPO}/web:${IMAGE_TAG} registro_web --detach
            docker service update --image ${REPO}/admin:${IMAGE_TAG} registro_admin --detach
          "
