name: registro

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-registro}
      POSTGRES_USER: ${POSTGRES_USER:-registro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-registro}
    ports:
      - "5433:5432"
    volumes:
      - registro-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U registro"]
      interval: 5s
      timeout: 5s
      retries: 20

  mysql:
    image: mysql:8.4.8
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-registro}
      MYSQL_USER: ${MYSQL_USER:-registro}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-registro}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-registro-root}
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_0900_ai_ci"]
    ports:
      - "3307:3306"
    volumes:
      - registro-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
    profiles:
      - mysql-import

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - registro-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-registro}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-registro-dev-secret}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - registro-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      target: development
    environment:
      APP_NAME: Registro API
      ENVIRONMENT: development
      WEB_ORIGINS: http://localhost:3000,http://localhost:3001
      CHESS_HOTEL_INTEGRATION_KEY: ${CHESS_HOTEL_INTEGRATION_KEY:-chess-hotel-development}
      CHESS_HOTEL_COMPANY_SLUG: ${CHESS_HOTEL_COMPANY_SLUG:-aero-hotel}
      REGISTRO_WEB_URL: ${REGISTRO_WEB_URL:-http://localhost:3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://registro:registro@postgres:5432/registro}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-registro-development-only-change-me}
      SEED_DEFAULT_PASSWORD: ${SEED_DEFAULT_PASSWORD:-Registro@123}
      PLATFORM_ADMIN_PASSWORD: ${PLATFORM_ADMIN_PASSWORD:-RegistroAdmin@123}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-registro}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-registro-dev-secret}
      S3_BUCKET: ${S3_BUCKET:-registro-attachments}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000}
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - "8000:8000"
    volumes:
      - ./api/app:/app/app
      - ./api/tests:/app/tests
      - ./api/alembic:/app/alembic
    command: ["sh", "-c", "alembic upgrade head && python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./web
      target: development
    environment:
      API_URL: http://api:8000/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ./web/app:/app/app
      - ./web/components:/app/components
      - ./web/lib:/app/lib
    depends_on:
      api:
        condition: service_healthy

  admin:
    build:
      context: ./admin
      target: development
    environment:
      API_URL: http://api:8000/api/v1
    ports:
      - "3001:3001"
    volumes:
      - ./admin/app:/app/app
      - ./admin/lib:/app/lib
    depends_on:
      api:
        condition: service_healthy

volumes:
  registro-postgres-data:
  registro-mysql-data:
  registro-redis-data:
  registro-minio-data:
